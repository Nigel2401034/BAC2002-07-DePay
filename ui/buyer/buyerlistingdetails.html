<!doctype html>
<html lang="en">
	<head>

		<link rel="stylesheet" href="../style.css" />
	</head>
	<body>

		<main class="container">
			<header class="hero">
				<p class="kicker">DePay Buyer</p>
				<h1>Listing Details</h1>
				<p id="listingDetailsSubtitle" class="muted">Loading listing...</p>
			</header>

			<section class="card">

				</div>

				<p id="listingDetailsStatus" class="status"></p>

				<div id="listingDetailsBody" class="result" style="border-top: none; padding-top: 0.25rem;">

				</div>
			</section>
		</main>

		<script src="../config.js"></script>
		<script src="../app.js"></script>
		<script src="./navbar.js"></script>
